<div class="relative w-full" [class.z-50]="isOpen">
  <!-- Trigger — styled as a DaisyUI input -->
  <div
    class="input input-bordered w-full flex items-center justify-between cursor-pointer"
    [class.input-primary]="isOpen"
    [class.input-disabled]="isDisabled"
    [class.opacity-60]="isDisabled"
    [class.cursor-not-allowed]="isDisabled"
    (click)="toggleOpen()"
  >
    <div class="flex-1 truncate">
      <span *ngIf="selectedItem" class="text-base-content">{{
        displayValue
      }}</span>
      <span *ngIf="!selectedItem" class="opacity-50">{{ placeholder }}</span>
    </div>

    <div class="flex items-center gap-1 shrink-0 ml-2">
      <span
        *ngIf="loading"
        class="loading loading-spinner loading-xs text-primary"
      ></span>

      <button
        *ngIf="selectedItem"
        type="button"
        class="btn btn-ghost btn-xs btn-circle"
        (click)="clearSelection($event)"
      >
        <span class="material-symbols-outlined text-base">close</span>
      </button>

      <span
        class="material-symbols-outlined text-base-content/40 transition-transform duration-200"
        [class.rotate-180]="isOpen"
      >
        expand_more
      </span>
    </div>
  </div>

  <!-- Dropdown Panel -->
  <div
    *ngIf="isOpen"
    class="absolute top-full mt-1 left-0 w-full bg-base-100 border border-base-300 rounded-box shadow-lg z-9999 overflow-hidden flex flex-col max-h-60"
  >
    <!-- Search inside dropdown -->
    <div class="p-2 border-b border-base-200 shrink-0">
      <div class="relative">
        <span
          class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-base-content/40"
          >search</span
        >
        <input
          type="text"
          autofocus
          class="input input-bordered input-sm w-full pl-9"
          placeholder="Type to search..."
          [value]="searchText"
          [disabled]="isDisabled"
          (input)="onSearchInput($event)"
          (click)="$event.stopPropagation()"
        />
      </div>
    </div>

    <!-- Options -->
    <div class="overflow-y-auto flex-1">
      <div
        *ngIf="loading && (!items || items.length === 0)"
        class="p-4 text-center opacity-50"
      >
        Loading...
      </div>

      <div
        *ngIf="!loading && (!items || items.length === 0)"
        class="p-4 text-center opacity-50"
      >
        No results found.
      </div>

      <div
        *ngFor="let item of items"
        class="px-4 py-2.5 cursor-pointer flex flex-col transition-colors hover:bg-base-200"
        [ngClass]="{
          'bg-base-200 text-primary font-semibold': valuesEqual(
            selectedValue,
            item[bindValue]
          ),
        }"
        (click)="selectItem(item)"
      >
        <span>{{ getLabel(item) }}</span>
        <span *ngIf="getSubLabel(item)" class="text-xs opacity-50 mt-0.5">{{
          getSubLabel(item)
        }}</span>
      </div>
    </div>
  </div>
</div>
