<ngx-datatable
  class="material striped bootstrap no-scrollbar w-full"
  [rows]="rows"
  [columnMode]="'force'"
  [headerHeight]="56"
  [footerHeight]="56"
  [rowHeight]="64"
  [scrollbarH]="false"
  [externalPaging]="true"
  [count]="totalCount"
  [offset]="pageOffset"
  [limit]="pageSize"
  [loadingIndicator]="loading"
  (activate)="onRowActivate($event)"
  (page)="onPage($event)"
>
  <ngx-datatable-column
    *ngFor="let col of columns"
    [name]="col.name"
    [prop]="col.prop"
    [sortable]="true"
    [minWidth]="col.minWidth ?? 140"
    [width]="col.width ?? 180"
  >
    <ng-template ngx-datatable-cell-template let-value="value">
      <ng-container [ngSwitch]="col.type">
        <span
          *ngSwitchCase="'status'"
          class="status-chip capitalize"
          [ngClass]="statusBadgeClass(value)"
        >
          {{ value }}
        </span>
        <span *ngSwitchCase="'date'">{{ value | date: "MMM d, y" }}</span>
        <span *ngSwitchDefault>{{ value }}</span>
      </ng-container>
    </ng-template>
  </ngx-datatable-column>

  <ngx-datatable-column
    name="Actions"
    [sortable]="false"
    [draggable]="false"
    [resizeable]="false"
    [canAutoResize]="false"
    [minWidth]="190"
    [width]="190"
  >
    <ng-template ngx-datatable-cell-template let-row="row">
      <div class="action-buttons" (click)="$event.stopPropagation()">
        <button
          type="button"
          class="table-action-btn table-action-btn-update"
          (click)="onUpdate($event, row)"
        >
          Edit
        </button>
        <button
          type="button"
          class="table-action-btn table-action-btn-delete"
          (click)="onDelete($event, row)"
        >
          Delete
        </button>
      </div>
    </ng-template>
  </ngx-datatable-column>
</ngx-datatable>
