<div class="p-3 max-w-6xl mx-auto w-full">
  <div class="card bg-base-100 shadow-sm border border-base-300">
    <div class="card-body">
      <div class="flex items-center gap-2">
        <button
          class="btn btn-ghost btn-circle btn-sm"
          type="button"
          (click)="onCancel()"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h3 class="card-title inline text-base-content text-2xl">
          Doctor Registration
        </h3>
      </div>

      <p class="text-base-content/60 mb-4">
        Create a new doctor profile and assign professional details.
      </p>

      <app-doctor-form
        (formSuccess)="onSuccess($event)"
        (formCancel)="onCancel()"
      ></app-doctor-form>
    </div>
  </div>
</div>
