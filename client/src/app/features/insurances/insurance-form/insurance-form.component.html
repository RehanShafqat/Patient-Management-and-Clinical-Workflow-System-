<div class="p-5 space-y-6">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="grid grid-cols-1 gap-6">
      <div class="form-control w-full">
        <label class="label pb-1">
          <span
            class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
          >
            Insurance Name
          </span>
        </label>
        <input
          type="text"
          class="input input-bordered h-10 text-sm w-full"
          [class.input-error]="isFieldInvalid('insurance_name')"
          formControlName="insurance_name"
          placeholder="Enter insurance name"
        />
        <p
          *ngIf="isFieldInvalid('insurance_name')"
          class="text-xs text-red-500 mt-1"
        >
          {{ getFieldErrorMessage("insurance_name") }}
        </p>
      </div>

      <div class="form-control w-full">
        <label class="label pb-1">
          <span
            class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
          >
            Insurance Code
          </span>
        </label>
        <input
          type="text"
          class="input input-bordered h-10 text-sm w-full"
          [class.input-error]="isFieldInvalid('insurance_code')"
          formControlName="insurance_code"
          placeholder="Enter insurance code"
        />
        <p
          *ngIf="isFieldInvalid('insurance_code')"
          class="text-xs text-red-500 mt-1"
        >
          {{ getFieldErrorMessage("insurance_code") }}
        </p>
      </div>

      <div class="form-control w-full" formArrayName="addresses">
        <div class="flex items-center justify-between gap-3 mb-2">
          <label class="label p-0">
            <span
              class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
            >
              Insurance Addresses
            </span>
          </label>
          <button
            type="button"
            class="btn btn-outline btn-sm"
            (click)="addAddress()"
          >
            <span class="material-symbols-outlined text-base">add</span>
            Add Address
          </button>
        </div>

        <div class="space-y-4">
          <div
            *ngFor="let addressGroup of addressesControls; let i = index"
            [formGroupName]="i"
            class="rounded-xl border border-base-300 bg-base-200/40 p-4 space-y-3"
          >
            <div class="flex items-center justify-between gap-4">
              <p class="text-sm font-semibold text-base-content">
                Address {{ i + 1 }}
              </p>

              <div class="flex items-center gap-3">
                <label class="label cursor-pointer gap-2 p-0">
                  <input
                    type="radio"
                    class="radio radio-primary radio-sm"
                    name="primaryInsuranceAddress"
                    [checked]="addressGroup.get('is_primary')?.value"
                    (change)="setPrimaryAddress(i)"
                  />
                  <span class="label-text text-xs uppercase tracking-wide"
                    >Primary</span
                  >
                </label>

                <button
                  type="button"
                  class="btn btn-ghost btn-sm"
                  [disabled]="!canRemoveAddress()"
                  (click)="removeAddress(i)"
                  title="Remove address"
                >
                  <span class="material-symbols-outlined text-base"
                    >delete</span
                  >
                </button>
              </div>
            </div>

            <div class="form-control w-full">
              <label class="label pb-1">
                <span
                  class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
                >
                  Address
                </span>
              </label>
              <textarea
                class="textarea textarea-bordered min-h-24 text-sm w-full"
                [class.textarea-error]="isAddressFieldInvalid(i, 'address')"
                formControlName="address"
                placeholder="Enter insurance address"
              ></textarea>
              <p
                *ngIf="isAddressFieldInvalid(i, 'address')"
                class="text-xs text-red-500 mt-1"
              >
                {{ getAddressFieldErrorMessage(i, "address") }}
              </p>
            </div>

            <div class="form-control w-full">
              <label class="label pb-1">
                <span
                  class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
                >
                  Contact Phone
                </span>
              </label>
              <input
                type="text"
                class="input input-bordered h-10 text-sm w-full"
                [class.input-error]="isAddressFieldInvalid(i, 'phone')"
                formControlName="phone"
                placeholder="Enter contact number"
              />
              <p
                *ngIf="isAddressFieldInvalid(i, 'phone')"
                class="text-xs text-red-500 mt-1"
              >
                {{ getAddressFieldErrorMessage(i, "phone") }}
              </p>
            </div>
          </div>
        </div>
      </div>

      <div class="form-control w-full">
        <label class="label pb-1">
          <span
            class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
          >
            Status
          </span>
        </label>
        <select
          class="select select-bordered h-10 min-h-0 text-sm w-full"
          formControlName="is_active"
        >
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <div class="flex items-center justify-end gap-3">
      <button
        type="button"
        class="btn btn-ghost"
        (click)="onCancel()"
        [disabled]="isSubmitting"
      >
        Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
        <span
          *ngIf="isSubmitting"
          class="loading loading-spinner loading-xs"
        ></span>
        {{
          isSubmitting
            ? "Saving..."
            : isEditMode
              ? "Save Changes"
              : "Create Insurance"
        }}
      </button>
    </div>
  </form>
</div>
