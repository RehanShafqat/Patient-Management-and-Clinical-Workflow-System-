<section class="space-y-6 p-6 md:p-8">
  <div class="flex items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-base-content">Patients</h1>
      <!-- INFO: Real-time record count from server metadata -->
      <p class="text-sm text-base-content/60 mt-1">
        {{ totalCount }} records found
      </p>
    </div>
    <a
      routerLink="/admin/patients/form"
      class="btn btn-primary gap-2 teal-glow"
    >
      <span class="material-symbols-outlined">person_add</span>
      Add Patient
    </a>
  </div>

  <!-- INFO: Advanced Filtering Section -->
  <div
    class="rounded-2xl border border-base-300 bg-base-100 p-5 md:p-6 space-y-4"
  >
    <div class="flex items-center gap-2">
      <p
        class="text-xs font-semibold uppercase tracking-wider text-base-content/60"
      >
        Patient Filters
      </p>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-12">
      <!-- Search Input -->
      <label class="form-control xl:col-span-3">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Search
        </span>
        <input
          type="text"
          class="input input-bordered mt-1 h-10 text-sm"
          placeholder="Name, Phone, etc."
          [(ngModel)]="filters.search"
          (ngModelChange)="onSearch($event)"
        />
      </label>

      <!-- Status Filter -->
      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Status
        </span>
        <select
          class="select select-bordered mt-1 h-10 min-h-0 text-sm capitalize"
          [(ngModel)]="filters.patient_status"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Status</option>
          <option
            *ngFor="let status of statusOptions"
            [ngValue]="status"
            class="capitalize"
          >
            {{ status | titlecase }}
          </option>
        </select>
      </label>

      <!-- Gender Filter -->
      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Gender
        </span>
        <select
          class="select select-bordered mt-1 h-10 min-h-0 text-sm capitalize"
          [(ngModel)]="filters.gender"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Gender</option>
          <option
            *ngFor="let gender of genderOptions"
            [ngValue]="gender"
            class="capitalize"
          >
            {{ gender.replaceAll("_", " ") | titlecase }}
          </option>
        </select>
      </label>

      <!-- City Filter -->
      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          City
        </span>
        <input
          type="text"
          class="input input-bordered mt-1 h-10 text-sm"
          placeholder="Filter by city"
          [(ngModel)]="filters.city"
          (ngModelChange)="onCitySearch($event)"
        />
      </label>

      <!-- Country Filter (Debounced) -->
      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Country
        </span>
        <input
          type="text"
          class="input input-bordered mt-1 h-10 text-sm"
          placeholder="Filter by country"
          [(ngModel)]="filters.country"
          (ngModelChange)="onCountrySearch($event)"
        />
      </label>

      <!-- Reset Filters -->
      <label class="form-control xl:col-span-1">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/0"
        >
          Reset
        </span>
        <button
          type="button"
          class="btn btn-outline h-10 mt-1"
          (click)="
            filters = {
              search: '',
              patient_status: undefined,
              gender: undefined,
              city: '',
              country: '',
            };
            currentPage = 1;
            loadPatients()
          "
        >
          Reset
        </button>
      </label>
    </div>
  </div>

  <!-- INFO: Paginated Data Table with Server-Side events -->
  <app-entity-table
    [columns]="columns"
    [rows]="patients"
    [loading]="loading"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [pageOffset]="currentPage - 1"
    (rowSelected)="onRowSelected($event)"
    (updateRequested)="openUpdateModal($event)"
    (deleteRequested)="openDeleteModal($event)"
    (pageChanged)="onPageChange($event)"
  />
</section>

<!-- INFO: Reusable Patient Form Hosted in Modal for Contextual Updates -->
<div class="modal" [class.modal-open]="isUpdateModalOpen">
  <div
    class="modal-box max-w-5xl p-0 overflow-hidden bg-base-100 rounded-2xl shadow-2xl border border-base-300"
  >
    <div
      class="modal-header p-6 border-b border-base-300 flex justify-between items-center bg-base-200/50"
    >
      <div>
        <h3 class="text-xl font-bold text-base-content">Edit Patient</h3>
        <p class="text-xs text-base-content/60 mt-0.5">
          Refine clinical registry metadata
        </p>
      </div>
      <button
        type="button"
        (click)="closeUpdateModal()"
        class="p-2 hover:bg-base-300 rounded-full transition-colors"
      >
        <span class="material-symbols-outlined text-base-content/70"
          >close</span
        >
      </button>
    </div>

    <div class="max-h-[80vh] overflow-y-auto bg-base-100">
      <app-patient-form
        *ngIf="isUpdateModalOpen"
        [patientToEdit]="selectedPatient"
        (formSuccess)="onUpdateSuccess($event)"
        (formCancel)="closeUpdateModal()"
      />
    </div>
  </div>
  <div
    class="modal-backdrop bg-black/40 backdrop-blur-sm"
    (click)="closeUpdateModal()"
  ></div>
</div>

<!-- INFO: Soft Delete Confirmation Dialog -->
<app-confirm-dialog
  [open]="isDeleteModalOpen"
  [title]="'Archive Patient Registry'"
  [message]="
    'Are you sure you want to archive ' +
    (selectedPatient
      ? selectedPatient.first_name + ' ' + selectedPatient.last_name
      : 'this patient') +
    '? This record will be moved to the clinical archive.'
  "
  [confirmLabel]="'Archive Record'"
  [variant]="'error'"
  [loading]="isDeleting"
  (openChange)="isDeleteModalOpen = $event"
  (confirmed)="confirmDelete()"
/>
