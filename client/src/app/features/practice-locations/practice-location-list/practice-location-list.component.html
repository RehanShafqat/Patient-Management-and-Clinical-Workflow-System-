<section class="space-y-6 p-6 md:p-8 pt-2 md:pt-4">
  <div class="flex items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-base-content">Practice Locations</h1>
      <p class="text-sm text-base-content/60 mt-1">
        {{ totalCount }} records found
      </p>
    </div>

    <div class="flex items-center gap-2">
      <button
        *ngIf="canExportPracticeLocations"
        type="button"
        class="btn btn-outline gap-2"
        [disabled]="loading"
        (click)="exportPracticeLocationsToExcel()"
      >
        <span class="material-symbols-outlined">download</span>
        Export Excel
      </button>

      <a
        *ngIf="canCreatePracticeLocations"
        routerLink="new"
        class="btn btn-primary gap-2 teal-glow"
      >
        <span class="material-symbols-outlined">add_location</span>
        Add Practice Location
      </a>
    </div>
  </div>

  <div
    class="rounded-2xl border border-base-300 bg-base-100 p-5 md:p-6 space-y-4"
  >
    <div class="flex items-center gap-2">
      <p
        class="text-xs font-semibold uppercase tracking-wider text-base-content/60"
      >
        Practice Location Filters
      </p>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-12">
      <div class="form-control xl:col-span-8">
        <div class="label pb-1">
          <span
            class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
          >
            Search
          </span>
        </div>
        <input
          type="text"
          class="input input-bordered h-10 text-sm w-full"
          [ngModel]="filters.search || ''"
          (ngModelChange)="onSearch($event)"
          placeholder="Search by location name or city"
        />
      </div>

      <div class="form-control xl:col-span-2">
        <div class="label pb-1">
          <span
            class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
          >
            Status
          </span>
        </div>
        <select
          class="select select-bordered h-10 min-h-0 text-sm w-full"
          [(ngModel)]="filters.is_active"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Status</option>
          <option [ngValue]="true">Active</option>
          <option [ngValue]="false">Inactive</option>
        </select>
      </div>

      <div class="form-control xl:col-span-2">
        <div class="label pb-1">
          <span
            class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/0"
          >
            Reset
          </span>
        </div>
        <button
          type="button"
          class="btn btn-outline h-10 w-full"
          (click)="resetFilters()"
        >
          Reset
        </button>
      </div>
    </div>
  </div>

  <app-entity-table
    [columns]="columns"
    [rows]="practiceLocations"
    [loading]="loading"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [pageOffset]="currentPage - 1"
    [showUpdateAction]="canUpdatePracticeLocations"
    [showDeleteAction]="canDeletePracticeLocations"
    (rowSelected)="onRowSelected($event)"
    (updateRequested)="onUpdateRequested($event)"
    (deleteRequested)="onDeleteRequested($event)"
    (pageChanged)="onPageChange($event)"
  />
</section>

<div class="modal" [class.modal-open]="isUpdateModalOpen">
  <div
    class="modal-box max-w-4xl p-0 overflow-hidden bg-base-100 rounded-2xl shadow-2xl border border-base-300"
  >
    <div
      class="modal-header p-6 border-b border-base-300 flex justify-between items-center bg-base-200/50"
    >
      <div>
        <h3 class="text-xl font-bold text-base-content">
          Edit Practice Location
        </h3>
        <p class="text-xs text-base-content/60 mt-0.5">
          Update location information and status
        </p>
      </div>
      <button
        type="button"
        (click)="closeUpdateModal()"
        class="p-2 hover:bg-base-300 rounded-full transition-colors"
      >
        <span class="material-symbols-outlined text-base-content/70"
          >close</span
        >
      </button>
    </div>

    <div class="max-h-[80vh] overflow-y-auto bg-base-100">
      <div
        *ngIf="isLoadingSelectedPracticeLocation"
        class="p-6 text-sm text-base-content/70"
      >
        Loading practice location details...
      </div>

      <app-practice-location-form
        *ngIf="
          isUpdateModalOpen &&
          selectedPracticeLocation &&
          !isLoadingSelectedPracticeLocation
        "
        [practiceLocationToEdit]="selectedPracticeLocation"
        (formSuccess)="onUpdateSuccess($event)"
        (formCancel)="closeUpdateModal()"
      />
    </div>
  </div>
  <div
    class="modal-backdrop bg-black/40 backdrop-blur-sm"
    (click)="closeUpdateModal()"
  ></div>
</div>

<app-confirm-dialog
  [open]="isDeleteModalOpen"
  [title]="'Delete Practice Location'"
  [message]="
    'Are you sure you want to delete practice location ' +
    (selectedPracticeLocation
      ? selectedPracticeLocation.location_name
      : 'record') +
    '?'
  "
  [confirmLabel]="'Delete'"
  [cancelLabel]="'Cancel'"
  [variant]="'error'"
  [loading]="isDeleting"
  (confirmed)="confirmDelete()"
  (openChange)="onDeleteModalChange($event)"
>
</app-confirm-dialog>
