<div class="min-h-screen bg-base-200 flex items-center justify-center px-4">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">

      <!-- Header -->
      <div class="text-center mb-2">
        <h1 class="text-2xl font-bold text-base-content">Patient Management System</h1>
        <p class="text-sm text-base-content/60 mt-1">Sign in to your account</p>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage" role="alert" class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current"
             fill="none" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span class="text-sm">{{ errorMessage }}</span>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="mt-2">

        <!-- Email -->
        <fieldset class="fieldset mb-4">
          <legend class="fieldset-legend">Email Address</legend>
          <input
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            class="input input-bordered w-full"
            [class.input-error]="email.invalid && email.touched"
          />
          <p *ngIf="email.invalid && email.touched" class="fieldset-label text-error">
            <span *ngIf="email.errors?.['required']">Email is required.</span>
            <span *ngIf="email.errors?.['email']">Enter a valid email address.</span>
          </p>
        </fieldset>

        <!-- Password -->
        <fieldset class="fieldset mb-6">
          <legend class="fieldset-legend">Password</legend>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
              class="input input-bordered w-full pr-16"
              [class.input-error]="password.invalid && password.touched"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="btn btn-ghost btn-xs absolute right-2 top-3 text-base-content/50">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <p *ngIf="password.invalid && password.touched" class="fieldset-label text-error">
            <span *ngIf="password.errors?.['required']">Password is required.</span>
            <span *ngIf="password.errors?.['minlength']">Minimum 6 characters.</span>
          </p>
        </fieldset>

        <!-- Submit -->
        <button
          type="submit"
          class="btn btn-primary w-full"
          [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center gap-2">
            <span class="loading loading-spinner loading-sm"></span>
            Signing in...
          </span>
        </button>

       <button class="btn btn-neutral">Neutral</button>
      </form>
    </div>
  </div>
</div>
