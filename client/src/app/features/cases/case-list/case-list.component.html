<section class="space-y-6 p-6 md:p-8 pt-2 md:pt-4">
  <div class="flex items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold text-base-content">Clinical Cases</h1>
      <p class="text-sm text-base-content/60 mt-1">
        {{ totalCount }} records found
      </p>
    </div>

    <a routerLink="new" class="btn btn-primary gap-2 teal-glow">
      <span class="material-symbols-outlined">add</span>
      New Case
    </a>
  </div>

  <div
    class="rounded-2xl border border-base-300 bg-base-100 p-5 md:p-6 space-y-4"
  >
    <div class="flex items-center gap-2">
      <p
        class="text-xs font-semibold uppercase tracking-wider text-base-content/60"
      >
        Case Filters
      </p>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-12">
      <label class="form-control xl:col-span-3">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Search
        </span>
        <input
          type="text"
          class="input input-bordered mt-1 h-10 text-sm"
          placeholder="Case #, patient, category, type..."
          [(ngModel)]="filters.search"
          (ngModelChange)="onSearch($event)"
        />
      </label>

      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Status
        </span>
        <select
          class="select select-bordered mt-1 h-10 min-h-0 text-sm"
          [(ngModel)]="filters.case_status"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Status</option>
          <option *ngFor="let status of statusOptions" [ngValue]="status">
            {{ status }}
          </option>
        </select>
      </label>

      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Priority
        </span>
        <select
          class="select select-bordered mt-1 h-10 min-h-0 text-sm"
          [(ngModel)]="filters.priority"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Priority</option>
          <option *ngFor="let priority of priorityOptions" [ngValue]="priority">
            {{ priority }}
          </option>
        </select>
      </label>

      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Category
        </span>
        <select
          class="select select-bordered mt-1 h-10 min-h-0 text-sm"
          [(ngModel)]="filters.category"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Categories</option>
          <option *ngFor="let category of categoryOptions" [ngValue]="category">
            {{ category }}
          </option>
        </select>
      </label>

      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          Case Type
        </span>
        <select
          class="select select-bordered mt-1 h-10 min-h-0 text-sm"
          [(ngModel)]="filters.case_type"
          (ngModelChange)="onFilterChange()"
        >
          <option [ngValue]="undefined">All Types</option>
          <option *ngFor="let type of typeOptions" [ngValue]="type">
            {{ type }}
          </option>
        </select>
      </label>

      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          From Date
        </span>
        <input
          type="date"
          class="input input-bordered mt-1 h-10 text-sm pr-10 min-w-44"
          [(ngModel)]="filters.opening_date_from"
          (ngModelChange)="onOpeningDateRangeChange()"
        />
      </label>

      <label class="form-control xl:col-span-2">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/60"
        >
          To Date
        </span>
        <input
          type="date"
          class="input input-bordered mt-1 h-10 text-sm pr-10 min-w-44"
          [(ngModel)]="filters.opening_date_to"
          (ngModelChange)="onOpeningDateRangeChange()"
        />
      </label>

      <label class="form-control xl:col-span-1">
        <span
          class="label-text text-xs font-semibold uppercase tracking-wide text-base-content/0"
        >
          Reset
        </span>
        <button
          type="button"
          class="btn btn-outline h-10 mt-1"
          (click)="resetFilters()"
        >
          Reset
        </button>
      </label>
    </div>
  </div>

  <app-entity-table
    [columns]="columns"
    [rows]="cases"
    [loading]="loading"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [pageOffset]="currentPage - 1"
    (rowSelected)="onRowSelected($event)"
    (updateRequested)="openUpdateModal($event)"
    (deleteRequested)="openDeleteModal($event)"
    (pageChanged)="onPageChange($event)"
  />
</section>

<!-- Update Modal -->
<div class="modal" [class.modal-open]="isUpdateModalOpen">
  <div
    class="modal-box max-w-5xl p-0 overflow-hidden bg-base-100 rounded-2xl shadow-2xl border border-base-300"
  >
    <div
      class="modal-header p-6 border-b border-base-300 flex justify-between items-center bg-base-200/50"
    >
      <div>
        <h3 class="text-xl font-bold text-base-content">Edit Case</h3>
        <p class="text-xs text-base-content/60 mt-0.5">
          Refine clinical case pathway details
        </p>
      </div>
      <button
        type="button"
        (click)="closeUpdateModal()"
        class="p-2 hover:bg-base-300 rounded-full transition-colors"
      >
        <span class="material-symbols-outlined text-base-content/70"
          >close</span
        >
      </button>
    </div>

    <div class="max-h-[80vh] overflow-y-auto bg-base-100 p-5">
      <app-case-form
        *ngIf="isUpdateModalOpen"
        [caseMode]="'edit'"
        [initialData]="selectedCase"
        (formSuccess)="onUpdateSuccess($event)"
        (formCancel)="closeUpdateModal()"
      />
    </div>
  </div>
  <div
    class="modal-backdrop bg-black/40 backdrop-blur-sm"
    (click)="closeUpdateModal()"
  ></div>
</div>

<!-- Delete Modal -->
<app-confirm-dialog
  [open]="isDeleteModalOpen"
  [title]="'Delete Case'"
  [message]="
    'Are you sure you want to delete case \'' +
    selectedCase?.case_number +
    '\'? This action is permanent and cannot be undone.'
  "
  [confirmLabel]="'Delete'"
  [cancelLabel]="'Cancel'"
  [variant]="'error'"
  [loading]="isDeleting"
  (confirmed)="confirmDelete()"
  (openChange)="closeDeleteModal()"
>
</app-confirm-dialog>
