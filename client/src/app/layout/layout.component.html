<!-- src/app/layout/layout.component.html -->
<div class="flex h-screen bg-base-200 overflow-hidden">
  <!-- ── Sidebar ─────────────────────────────────── -->
  <aside
    class="flex flex-col bg-base-100 shadow-lg transition-all duration-300 z-20"
    [class.w-64]="sidebarOpen"
    [class.w-16]="!sidebarOpen"
  >
    <!-- Logo / Brand -->
    <div class="flex items-center gap-3 px-4 py-5 border-b border-base-200">
      <div class="avatar placeholder shrink-0">
        <div
          class="bg-primary text-primary-content rounded-lg w-8 h-8 text-xs font-bold flex items-center justify-center"
        >
          P
        </div>
      </div>
      <span
        *ngIf="sidebarOpen"
        class="font-bold text-base-content text-sm leading-tight"
      >
        Patient<br />Management
      </span>
    </div>

    <!-- Role Badge -->
    <div *ngIf="sidebarOpen" class="px-4 py-3 border-b border-base-200">
      <span class="badge badge-sm" [class]="roleColor">
        {{ userRoleLabel }}
      </span>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 py-4 overflow-y-auto">
      <ul class="menu menu-sm px-2 gap-1">
        <li *ngFor="let item of navItems">
          <a
            [routerLink]="item.route"
            class="flex items-center gap-3 rounded-lg transition-colors"
            [class.bg-primary]="isActive(item.route)"
            [class.text-primary-content]="isActive(item.route)"
            [class.text-base-content]="!isActive(item.route)"
          >
            <!-- Icons using simple SVG shapes -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 shrink-0"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <!-- grid icon -->
              <path
                *ngIf="item.icon === 'grid'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0
                   01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0
                   01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0
                   012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0
                   012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
              />
              <!-- users icon -->
              <path
                *ngIf="item.icon === 'users'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10
                   0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0
                   015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0
                   0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"
              />
              <!-- person icon -->
              <path
                *ngIf="item.icon === 'person'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7
                   7h14a7 7 0 00-7-7z"
              />
              <!-- folder icon -->
              <path
                *ngIf="item.icon === 'folder'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 7a2 2 0 012-2h4l2 2h6a2 2 0 012 2v8a2 2 0
                   01-2 2H5a2 2 0 01-2-2V7z"
              />
              <!-- calendar icon -->
              <path
                *ngIf="item.icon === 'calendar'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2
                   2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
              />
              <!-- clipboard icon -->
              <path
                *ngIf="item.icon === 'clipboard'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0
                   002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0
                   002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>

            <span *ngIf="sidebarOpen" class="text-sm">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- User Info + Logout at bottom -->
    <div class="border-t border-base-200 p-3">
      <div *ngIf="sidebarOpen" class="flex items-center gap-3 mb-3 px-1">
        <div class="avatar placeholder shrink-0">
          <div
            class="bg-neutral text-neutral-content rounded-full w-8 h-8 text-xs"
          >
            <span
              >{{ currentUser?.first_name?.charAt(0)
              }}{{ currentUser?.last_name?.charAt(0) }}</span
            >
          </div>
        </div>
        <div class="overflow-hidden">
          <p class="text-sm font-medium text-base-content truncate">
            {{ userFullName }}
          </p>
          <p class="text-xs text-base-content/50 truncate">
            {{ currentUser?.email }}
          </p>
        </div>
      </div>
      <button
        (click)="logout()"
        class="btn btn-ghost btn-sm w-full justify-start gap-2 text-error hover:bg-error/10"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 shrink-0"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3
                   3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          />
        </svg>
        <span *ngIf="sidebarOpen" class="text-sm">Logout</span>
      </button>
    </div>
  </aside>

  <!-- ── Main Content Area ───────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header
      class="bg-base-100 shadow-sm px-6 py-4 flex items-center justify-between shrink-0"
    >
      <div class="flex items-center gap-4">
        <!-- Sidebar toggle button -->
        <button
          (click)="toggleSidebar()"
          class="btn btn-ghost btn-sm btn-square"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>

        <!-- Page title from active route -->
        <h2 class="text-base font-semibold text-base-content">
          Welcome, {{ currentUser?.first_name }}
        </h2>
      </div>

      <!-- Topbar right: role badge -->
      <div class="flex items-center gap-3">
        <span class="badge" [class]="roleColor">{{ userRoleLabel }}</span>
      </div>
    </header>

    <!-- Page Content — router-outlet renders dashboard here -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>
