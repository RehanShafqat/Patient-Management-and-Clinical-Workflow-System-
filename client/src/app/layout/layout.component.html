<div class="bg-surface-low text-on-background min-h-screen relative">
  <app-sidebar></app-sidebar>
  <main class="ml-64 p-6 pt-2 min-h-screen">
    <router-outlet></router-outlet>
  </main>

  <!-- Floating Theme Toggle -->
  <button (click)="toggleTheme()"
    class="fixed bottom-8 right-8 w-14 h-14 rounded-full bg-slate-800 dark:bg-white text-white dark:text-slate-900 shadow-[0_8px_30px_rgb(0,0,0,0.12)] hover:shadow-[0_8px_30px_rgba(13,148,136,0.3)] hover:scale-110 transition-all duration-300 z-[100] flex items-center justify-center group outline-none"
    [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
    <span
      class="material-symbols-outlined text-[28px] group-hover:rotate-[360deg] transition-transform duration-500 ease-in-out">
      {{ isDarkMode() ? 'light_mode' : 'dark_mode' }}
    </span>
    <!-- Tooltip -->
    <div
      class="absolute right-full mr-4 bg-slate-800 dark:bg-slate-700 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 whitespace-nowrap pointer-events-none font-semibold shadow-md">
      {{ isDarkMode() ? 'Light Mode' : 'Dark Mode' }}
    </div>
  </button>
</div>
