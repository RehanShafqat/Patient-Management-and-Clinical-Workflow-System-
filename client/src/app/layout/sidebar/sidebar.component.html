<aside
  class="fixed left-0 top-0 bottom-0 flex flex-col bg-slate-900 dark:bg-slate-950 h-full w-64 shadow-[0px_0px_12px_rgba(13,148,136,0.2)] z-50"
>
  <div class="px-6 py-8">
    <div class="flex items-center gap-3 mb-10">
      <div
        class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center"
      >
        <span class="material-symbols-outlined text-white text-lg"
          >medical_services</span
        >
      </div>
      <div>
        <h1 class="text-xl font-bold tracking-tighter text-white">MedFlow</h1>
        <p
          class="text-[10px] text-teal-400/80 font-medium tracking-widest uppercase"
        >
          Clinical Sanctuary
        </p>
      </div>
    </div>
    <nav class="space-y-1">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="text-white bg-teal-500/10 border-l-4 border-teal-500 shadow-[0px_0px_12px_rgba(13,148,136,0.3)]"
        class="text-slate-400 hover:text-white flex items-center gap-3 px-4 py-3 transition-colors hover:bg-slate-800 font-inter text-sm font-medium tracking-tight"
      >
        <span class="material-symbols-outlined" [attr.data-icon]="item.icon">{{
          item.icon
        }}</span>
        {{ item.label }}
      </a>
    </nav>
  </div>
  <div class="mt-auto px-6 py-6 border-t border-slate-800/50">
    @if (currentUser$ | async; as user) {
      <div class="flex items-center gap-3 mb-4">
        <button
          type="button"
          class="btn btn-ghost btn-circle avatar w-9 h-9 rounded-full bg-teal-500 flex items-center justify-center border border-teal-400"
        >
          <span class="material-symbols-outlined text-white text-lg"
            >person</span
          >
        </button>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold text-white truncate break-words">
            {{ user.first_name }} {{ user.last_name }}
          </p>
          <p
            class="text-[10px] text-teal-400 font-medium uppercase tracking-wider"
          >
            {{ user.role }}
          </p>
        </div>
      </div>

      <div class="space-y-1">
        <button
          (click)="openLogoutConfirm()"
          class="w-full text-slate-400 hover:text-red-400 flex items-center gap-3 px-4 py-2 transition-colors hover:bg-slate-800 rounded-lg font-inter text-sm font-medium tracking-tight"
        >
          <span class="material-symbols-outlined text-xl">logout</span>
          Logout
        </button>
      </div>
    }
  </div>
</aside>

<dialog #logoutConfirmModal class="modal z-[100]">
  <div
    class="modal-box max-w-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800"
  >
    <h3 class="font-semibold text-base text-slate-900 dark:text-white">
      Confirm Logout
    </h3>
    <p class="py-3 text-sm text-slate-600 dark:text-slate-400">
      Are you sure you want to log out from your account?
    </p>
    <div class="modal-action">
      <button
        type="button"
        class="btn btn-ghost text-slate-700 dark:text-slate-300"
        [disabled]="isLoggingOut"
        (click)="closeLogoutConfirm()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="btn btn-error text-white"
        [disabled]="isLoggingOut"
        (click)="logout()"
      >
        {{ isLoggingOut ? "Logging out..." : "Logout" }}
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button
      type="button"
      [disabled]="isLoggingOut"
      (click)="closeLogoutConfirm()"
    >
      close
    </button>
  </form>
</dialog>
